<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ultra Premium 3D Portfolio</title>
<link rel="stylesheet" href="styles.css">

<!-- GSAP -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>

<!-- Three.js -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r152/three.min.js"></script>
</head>
<body class="dark">

<canvas id="bg"></canvas>

<header>
    <div class="logo">MyPortfolio</div>
    <nav>
        <a href="#home">Home</a>
        <a href="#about">About</a>
        <a href="#projects">Projects</a>
        <a href="#contact">Contact</a>
    </nav>
    <button id="themeToggle">☀</button>
</header>

<section id="home" class="section hero">
    <h1 class="title">Creative 3D Developer</h1>
    <p class="subtitle">Ultra Premium Interactive Experiences</p>
    <button class="magnetic">Explore Work</button>
</section>

<section id="about" class="section">
    <h2>About Me</h2>
    <p>I build immersive 3D and animated web platforms using modern technologies.</p>
</section>

<section id="projects" class="section">
    <h2>Projects</h2>
    <div class="cards">
        <div class="card draggable">Project One</div>
        <div class="card draggable">Project Two</div>
        <div class="card draggable">Project Three</div>
    </div>
</section>

<section id="contact" class="section">
    <h2>Contact</h2>
    <p>Let’s build something futuristic.</p>
</section>

<script src="script.js"></script>
</body>
</html>

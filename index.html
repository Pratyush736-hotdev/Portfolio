<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Modern Animated Portfolio</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="cursor"></div>

<header>

</header>

<section id="home" class="section hero">

<section id="projects" class="section">

        <div class="card draggable">Project 1</div>
        <div class="card draggable">Project 2</div>
        <div class="card draggable">Project 3</div>
    </div>
</section>

<section id="contact" class="section">

    <p class="reveal">Let's build something amazing together.</p>
</section>

<div class="floating shape1 draggable"></div>
<div class="floating shape2 draggable"></div>
